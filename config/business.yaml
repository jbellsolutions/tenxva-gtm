# TenXVA / AI Growth Hackers — Business Configuration
# Updated March 16, 2026 — Authority Content Engine
# Philosophy: Less volume, higher quality, more dialed in
# Content Mix: 40% pure value, 25% use cases, 20% industry insight, 15% business
# Cadence: 1 post/day, 2 articles/week (Tue/Thu), 1 newsletter/week (Wed)

business_name: "TenXVA"
brand: "Using AI to Scale"
future_brand: "AI Growth Hackers"
contact: "justin@usingaitoscale.com"
website: "usingaitoscale.com"
linkedin: "https://www.linkedin.com/in/jbellsolutions/"

# ============================================================
# CONTENT PHILOSOPHY (NEW — drives everything)
# ============================================================
content_philosophy:
  core_principle: >
    Content exists to build authority and trust through genuine value.
    Business outcomes (leads, DMs, clients) are a BYPRODUCT of consistently
    excellent content. They are never the goal of any individual post.
    Most posts should have zero commercial angle whatsoever.

  content_mix:
    pure_value: 40  # AI discoveries, experiments, tool reviews. ZERO business mention.
    use_cases: 25   # Real projects with specific tools, timelines, results. Business context is natural.
    industry_insight: 20  # Trends, contrarian takes, commentary. Justin's unique lens.
    business: 15    # The ONLY content where placement/hiring is mentioned. Insight first.

  storytelling_framework: "Mueller"
  mueller_principles:
    - "Open with scene, not lesson"
    - "One story, one insight — go deeper, not wider"
    - "Stay in 'I' longer than comfortable"
    - "Use parenthetical asides to reveal character"
    - "Trust the reader to scale the story"
    - "Find uncontrived spectacles"
    - "Discernment over volume — kill your darlings"

  newsletter_principles:
    - "Lead with specific, concrete story — not abstraction"
    - "Always answer 'So what?' — the 'Why it matters' bridge"
    - "Feature real humans doing real things with AI (highest engagement)"
    - "Specificity Stack: name the tool, state the time, quantify the result"
    - "Personality separates. Neutral = forgettable."
    - "Screenshot This principle: every post needs a saveable element"

  the_bar: >
    Would a busy executive save this post? If no, it's not ready.
    Would this post be valuable if TenXVA didn't exist? If no, rewrite it.

# ============================================================
# POSITIONING (updated for authority, not sales)
# ============================================================
positioning:
  core_message: >
    Justin Bellware is an AI implementation practitioner who builds AI-powered
    teams, tests AI tools daily, and shares what actually works. He runs a
    business that places AI-trained overseas talent into companies — but his
    content is about sharing genuine insights, not pitching services.
  differentiator: >
    Unlike most AI content creators who regurgitate news or sell courses,
    Justin shares insights from actually DOING the work — placing AI talent,
    building agent teams, testing tools, and implementing AI workflows across
    industries. Every insight comes from direct experience.
  for_the_audience: >
    Business owners and operators who want practical AI knowledge from someone
    who's in the trenches every day. Not theory. Not hype. Just what works,
    what doesn't, and what's coming next.
  platform_teaser: >
    Building AI Growth Hackers — a marketplace where businesses can find and
    hire certified AI freelancers. Launching soon. Mentioned occasionally and
    naturally, never as a pitch.

primary_offer:
