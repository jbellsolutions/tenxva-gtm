# ============================================================
# CASE STUDIES (updated — story material, not pitch material)
# ============================================================
case_studies:
  usage_note: >
    These are STORY MATERIAL for the 25% use case content. They should be told
    using the Mueller storytelling framework — scene first, insight after. They
    should NOT be listed as proof points or used as sales ammunition. And they
    should be supplemented with FRESH micro-stories from daily work.

  stories:
    - title: "Operations Manager Running 5 AI Agent Teams"
      scene: "The moment she showed me her Claude dashboard with 5 active agent teams running simultaneously"
      result: "Taking over recruiting operations and project management for the entire company"
      insight: "One trained AI operator can replace what used to take an entire department"
      specificity_stack:
        tools: ["Claude Code", "Claude Cowork"]
        timeline: "30 days from onboarding to running 5 agent teams"
        quantified_result: "5 AI agent teams managed by one person"

    - title: "Startup: Prototype to Alpha in 5 Days"
      scene: "Day one — nothing built. Day five — alpha test ready with a group of testers lined up"
      result: "One week away from launching with paid subscribers"
      insight: "An AI-trained developer compresses months of work into days"
      specificity_stack:
        tools: ["Claude Code", "Cursor"]
        timeline: "5 days from zero to alpha"
        quantified_result: "Ready for paid subscribers in under 2 weeks"

    - title: "Insurance Agency: Custom CRM in 48 Hours"
      scene: "The agency owner's face when I showed him the live CRM on day three"
      result: "Fully custom-built CRM, no SaaS subscription, built exactly to spec"
      insight: "What agencies quote 6 weeks for, an AI-trained dev delivered in 2 days"
      specificity_stack:
        tools: ["Claude Code"]
        timeline: "48 hours"
        quantified_result: "Custom CRM vs. $50K+ agency quote"

  fresh_story_sources: >
    Generate new micro-stories from: tools tested this week, workflows discovered,
    client problems solved, AI experiments run, team wins, things that didn't work
    (failures are high-engagement). Fresh stories always beat recycled case studies.

