# ============================================================
# AUDIENCE
# ============================================================
audience:
  primary: >
    Business owners and operators who want practical AI knowledge. They follow
    Justin because he consistently shares things worth knowing — tools, techniques,
    insights, and real stories from the trenches. Some of them eventually become
    clients, but that's a byproduct of trust, not a content strategy.
  secondary: >
    AI-curious professionals, startup founders, and agency owners who want to
    stay ahead on AI implementation without wading through hype and noise.
  what_they_want:
    - "Practical AI insights they can use this week"
    - "Real stories about what works and what doesn't"
    - "Tool recommendations from someone who tests them"
    - "A perspective on AI that's grounded in practice, not theory"
    - "Frameworks and templates they can save and reference"
    - "An expert who admits what he doesn't know and shares his learning process"

# ============================================================
# VOICE (updated for authority content)
# ============================================================
voice:
  tone: "Knowledgeable peer sharing what he's learning. Not guru. Not salesperson."
  personality: >
    The friend in your network who's always 3 steps ahead on AI and shares what
    he finds. Curious. Opinionated but not dogmatic. Uses parenthetical asides.
    Admits when he's wrong or surprised. Shares both wins and things that didn't work.
  perspective: >
    First person. Justin's voice. Speaking from direct experience — building with
    AI tools, managing AI teams, and seeing what actually works across industries.
    Not lecturing. Sharing.
  content_angle: >
    Content should make the reader think: "I learned something valuable today."
    NOT "This person is trying to sell me something." The business should be
    INVISIBLE in 85% of content and background context in the other 15%.
  never:
    - "DM me [KEYWORD] CTAs — this is engagement bait"
    - "Hard CTAs (Book a call, Buy today, Link in bio)"
    - "Hashtags (dead per 2026 algorithm)"
    - "Hype or exaggeration (game-changing, revolutionary, mind-blowing)"
    - "Generic AI advice that anyone could give"
    - "Posts that read like ads disguised as content"
    - "Starting posts with the takeaway instead of a scene/story"
    - "Ending every post with a CTA — most should just END"
    - "Recycling the same 3 case studies without fresh angles"
    - "Referring to VAs as cheap labor — they're elite trained talent"
  always:
    - "Open with a scene, moment, or story (Mueller framework)"
    - "Include specific tools, numbers, and timelines (Specificity Stack)"
    - "Write for saves — include frameworks and practical takeaways"
    - "Add genuine personality — parenthetical asides, humor, honesty"
    - "Share both successes AND failures/surprises"
    - "Trust the reader to draw their own conclusions"
    - "End cleanly — no tacked-on CTAs unless genuinely organic"
  copywriter_dna_emphasis:
    - "bill_mueller: Storytelling, curiosity, scene-first narrative"
    - "alex_hormozi: Direct value, tactical frameworks, specific numbers"
    - "brian_kurtz: Authority through depth of experience, industry stories"
    - "liam_ottley: AI/automation focused, modern, tool-specific"
    - "jay_abraham: Strategic positioning, big-picture frameworks"
    - "jon_buchan: Pattern interrupts, personality, unconventional angles"
    - "tom_bilyeu: Personal transformation, vulnerability, learning journeys"

# ============================================================
# CTA PHILOSOPHY (completely reworked)
# ============================================================
ctas:
  philosophy: >
    The best content doesn't need a CTA. If someone reads a genuinely valuable
    post and wants to work with Justin, they'll find him. CTAs should be the
    exception, not the rule. When they appear, they must feel like a natural
    extension of the content, never an appendage.

  distribution:
    no_cta: "60%+ of posts — just end with a thought or clean close"
    genuine_question: "20% — invite real discussion, not manufactured engagement"
    save_prompt: "15% — when the post has a genuinely saveable element"
    dm_invite: "5% MAX — only when organically relevant to the post content"

  approved_when_organic:
    - "What's your experience with this?"
    - "Am I wrong here? Genuinely curious."
    - "Save this for when you [specific situation]"
    - "What would you add to this list?"
    - "Happy to share more details — DM me anytime"

  never_use:
    - "DM me 'HIRE'"
    - "DM me 'AI VA'"
    - "Comment 'AI VA' below"
    - "Comment '[ANY KEYWORD]' below"
    - "Drop a [KEYWORD] in the comments"
    - "Comment below and my AI will shoot it to you"
    - "Book a call"
    - "Link in bio"
    - Any formulaic, templated CTA
    - Any keyword-trigger CTA of any kind

linkedin_algorithm_2026:
  saves_are_king: "Bookmarks/saves carry more weight than likes — write save-worthy content"
  no_hashtags: "Hashtags are dead — algorithm scans text via interest graphs"
  links_in_post: "Links can go IN the post now, no need to hide in comments"
  consistency: "Predictable schedule matters more than posting at a magic hour"
  profile_authority: "360 Brew update — headline/about/experience must match content topics"
  human_visuals: "If it looks like an ad, it gets treated like one"
  polls_warning: "Polls get highest reach but WORST for follower growth and conversion"
