  placement_fee: "$1,000 one-time"
  what_you_get: >
    A fully trained AI VA placed into your business. They've completed a
    30-day AI bootcamp, know Claude Code, Cursor, ClickUp Brain, and the
    full AI stack. They come ready to produce.
  ongoing_rate: "$5-10/hour (paid directly to the VA)"
  guarantee: "If they don't perform, we replace them. Period."
  content_note: >
    This offer should ONLY appear in the 15% business content category.
    It should never be the focus of pure value, use case, or industry
    insight posts. When it appears, it should be background context in
    a story, never the headline.

training_offer:
